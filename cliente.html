<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#14b8a6">
    <title>Destrava e Rende | Pedido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { principal: '#14b8a6' } } } }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 m-0 p-0 font-sans">
<header class="bg-[#14b8a6] text-white p-4">
    <h1 class="text-xl font-bold">🚀 Destrava e Rende</h1>
    <p class="text-sm">Peça e receba em casa</p>
</header>
<main class="p-4 max-w-xl mx-auto">
    <div class="bg-white p-5 rounded-xl shadow">
        <h2 class="text-lg font-semibold mb-4">Faça seu pedido</h2>
        <input type="text" id="nome" placeholder="Seu nome" class="w-full p-2 mb-3 border rounded">
        <input type="tel" id="fone" placeholder="WhatsApp" class="w-full p-2 mb-3 border rounded">
        <input type="text" id="endereco" placeholder="Endereço completo" class="w-full p-2 mb-3 border rounded">
        <textarea id="itens" placeholder="O que você quer pedir?" rows="3" class="w-full p-2 mb-3 border rounded"></textarea>
        <input type="number" step="0.01" id="valor" placeholder="Valor total R$" class="w-full p-2 mb-4 border rounded">
        <button onclick="enviar()" class="w-full bg-[#14b8a6] text-white p-3 rounded font-medium">Enviar Pedido</button>
    </div>
</main>
<script>
function enviar() {
    const dados = {
        nome: document.getElementById('nome').value,
        fone: document.getElementById('fone').value,
        endereco: document.getElementById('endereco').value,
        itens: document.getElementById('itens').value,
        valor: document.getElementById('valor').value
    };
    if(!dados.nome || !dados.fone || !dados.itens) return alert('Preencha todos os campos');
    const pedidos = JSON.parse(localStorage.getItem('pedidos')) || [];
    pedidos.push({ id: Date.now(), ...dados, status: 'novo' });
    localStorage.setItem('pedidos', JSON.stringify(pedidos));
    alert('Pedido enviado com sucesso!');
    document.querySelectorAll('input,textarea').forEach(el => el.value = '');
}
</script>
</body>
</html>
